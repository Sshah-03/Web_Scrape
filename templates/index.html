<!DOCTYPE html>
<html>

<head>

<title>Async Web Scraper</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<h1>Async Web Scraper</h1>

<div class="controls">

<select id="source">

<option value="all">All Websites</option>
<option value="fakestore">FakeStore</option>
<option value="hackernews">HackerNews</option>
<option value="reddit">Reddit</option>

</select>

<button onclick="runScraper()">Scrape</button>

</div>

<div id="results" class="results"></div>

</div>

<script>

async function runScraper(){

const source = document.getElementById("source").value

const res = await fetch(`/scrape?source=${source}`)

const data = await res.json()

const resultsDiv = document.getElementById("results")

resultsDiv.innerHTML = ""

data.data.forEach(item => {

const card = document.createElement("div")

card.className = "card"

card.innerHTML = `

${item.image ? `<img src="${item.image}" />` : ""}

<h3>${item.title}</h3>

<p>${item.price ? "$"+item.price : ""}</p>

${item.url ? `<a href="${item.url}" target="_blank">Open Link</a>` : ""}

${item.link ? `<a href="${item.link}" target="_blank">View Product</a>` : ""}

`

resultsDiv.appendChild(card)

})

}

</script>

</body>

</html>
